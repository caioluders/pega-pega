<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEGA-PEGA Credentials</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"><span class="slash">||</span> PEGA<span class="slash">/</span>PEGA</div>
      <div class="brand-tagline">// captured credentials</div>
    </div>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/mock">Mock Rules</a>
      <a href="/credentials" aria-current="page">Credentials</a>
      <a href="/?settings=1">Settings</a>
    </nav>
    <div class="top-right">
      <button class="theme-toggle" type="button" id="themeToggle">Dark</button>
      <button class="theme-toggle" type="button" id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </header>

  <main class="page">
    <pre class="ascii-divider">/// CAPTURED CREDENTIALS ---------------------------------------------------</pre>
    <h1>Credentials</h1>
    <p class="subtitle">// aggregated from all protocols - NTLM, Basic, plaintext, hashes</p>

    <div class="mock-toolbar">
      <div class="search mock-search"><span>FIND</span><input id="credSearch" placeholder="user, type, IP, protocol..."><span id="credMatchHint">0/0</span></div>
      <button type="button" id="exportHashcatBtn">Export Hashcat</button>
      <button type="button" id="exportJohnBtn">Export John</button>
      <button type="button" id="exportCsvBtn">Export CSV</button>
    </div>

    <div class="cred-stats" id="credStats"></div>

    <div class="log">
      <div class="log-grid" id="credGrid">
        <div class="log-head">
          <div>Type</div><div>User</div><div>Secret</div><div>Source</div><div>Protocol</div><div>Time</div><div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/static/app.js"></script>
<script>
let creds = [];

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("pega-theme", theme);
  themeToggle.textContent = theme === "light" ? "Light" : "Dark";
}

function typeLabel(type) {
  const labels = { ntlm_v2: "NTLMv2", basic: "Basic", plaintext: "Plaintext", mysql_hash: "MySQL", community_string: "SNMP" };
  return labels[type] || type;
}
function typeClass(type) {
  const map = { ntlm_v2: "warn", basic: "accent", plaintext: "ok", mysql_hash: "p-mysql", community_string: "p-snmp" };
  return map[type] || "";
}

function filteredCreds() {
  const q = credSearch.value.trim().toLowerCase();
  if (!q) return creds;
  return creds.filter(c => [c.user, c.secret, c.type, c.source_ip, c.protocol, c.domain].some(v => String(v || "").toLowerCase().includes(q)));
}

async function loadCreds() {
  const resp = await fetch("/api/credentials");
  if (resp.status === 401) { location.href = "/login"; return; }
  const data = await resp.json();
  creds = data.credentials || [];
  renderCreds();
  renderStats();
}

function renderStats() {
  const types = {};
  creds.forEach(c => { types[c.type] = (types[c.type] || 0) + 1; });
  credStats.innerHTML = Object.entries(types).map(([t, n]) => `<span class="stat"><span class="stat-tag cred-type-${typeClass(t)}">${escapeHtml(typeLabel(t))}</span><span class="stat-count">${n}</span></span>`).join("");
}

function renderCreds() {
  const list = filteredCreds();
  credMatchHint.textContent = `${list.length}/${creds.length}`;
  const grid = credGrid;
  grid.querySelectorAll(".log-row,.empty-log").forEach(el => el.remove());
  if (!list.length) {
    grid.insertAdjacentHTML("beforeend", `<div class="empty-log">/// no credentials captured yet</div>`);
    return;
  }
  list.forEach(c => {
    const secret = c.type === "ntlm_v2" ? c.secret.slice(0, 40) + "..." : escapeHtml(c.secret);
    grid.insertAdjacentHTML("beforeend", `<div class="log-row" data-id="${escapeHtml(c.id)}">
      <div><span class="cred-type cred-type-${typeClass(c.type)}">${escapeHtml(typeLabel(c.type))}</span></div>
      <div class="cred-user">${escapeHtml(c.user || "-")}${c.domain ? `<span class="dim">@${escapeHtml(c.domain)}</span>` : ""}</div>
      <div class="cred-secret">${secret}</div>
      <div>${escapeHtml(c.source_ip)}:<span class="dim">${escapeHtml(c.source_port)}</span></div>
      <div><span class="p-tag" style="--p-c:var(--p-${(c.protocol || "raw_tcp").toLowerCase()})">${escapeHtml(c.protocol)}</span></div>
      <div class="col-time">${escapeHtml(formatTime(c.timestamp))}</div>
      <div><button type="button" class="copy-btn" data-secret="${escapeHtml(c.secret)}">Copy</button></div>
    </div>`);
  });
  grid.querySelectorAll(".copy-btn").forEach(btn => btn.onclick = () => { navigator.clipboard.writeText(btn.dataset.secret); btn.textContent = "OK"; setTimeout(() => btn.textContent = "Copy", 1000); });
}

function exportHashcat() {
  const lines = creds.filter(c => c.type === "ntlm_v2").map(c => c.secret);
  if (!lines.length) { alert("No NTLMv2 hashes to export"); return; }
  download("pega-hashes-ntlmv2.txt", lines.join("\n"));
}
function exportJohn() {
  const lines = creds.filter(c => c.type === "ntlm_v2").map(c => c.secret);
  if (!lines.length) { alert("No NTLMv2 hashes to export"); return; }
  download("pega-hashes-john.txt", lines.join("\n"));
}
function exportCsv() {
  const header = "type,user,secret,domain,source_ip,protocol,timestamp";
  const rows = creds.map(c => [c.type, c.user, c.secret, c.domain || "", c.source_ip, c.protocol, c.timestamp].map(v => `"${String(v || "").replace(/"/g, '""')}"`).join(","));
  download("pega-credentials.csv", [header, ...rows].join("\n"));
}
function download(name, content) {
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

async function checkAuth() {
  const resp = await fetch("/api/config");
  if (resp.ok) {
    const cfg = await resp.json();
    logoutBtn.style.display = cfg.password_set ? "" : "none";
  }
}
async function doLogout() { await fetch("/api/auth/logout", { method: "POST" }); location.href = "/login"; }

applyTheme(localStorage.getItem("pega-theme") || "dark");
themeToggle.onclick = () => applyTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
logoutBtn.onclick = doLogout;
credSearch.oninput = renderCreds;
exportHashcatBtn.onclick = exportHashcat;
exportJohnBtn.onclick = exportJohn;
exportCsvBtn.onclick = exportCsv;
loadCreds();
checkAuth();
</script>
</body>
</html>
